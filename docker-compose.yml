services:
  postgres:
    image: postgres:16-alpine
    container_name: jobtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobtracker-net

  backend:
    build:
      context: ./backend
    container_name: jobtracker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: super-secret-key-change-me-later-in-production
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://192.168.0.5:3000
    ports:
      - "8080:8080"
    networks:
      - jobtracker-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: jobtracker-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - jobtracker-net

volumes:
  pgdata:

networks:
  jobtracker-net:
    driver: bridge